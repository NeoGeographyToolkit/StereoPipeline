name: build_test_linux_arm
on:
  workflow_dispatch:

jobs:
  build:
    # ubuntu-24.04-arm has glibc 2.39; the conda deps + binaries were built in a
    # glibc-2.39 container and require GLIBC_2.38, which ubuntu-22.04-arm (glibc
    # 2.35) lacks ("GLIBC_2.38 not found"). Must match/exceed the build glibc.
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v3
    # The ubuntu-24.04-arm image ships a large pre-installed tool cache and SDKs
    # we never use (Android, .NET, Haskell, cached toolchains, Docker images).
    # The CaSSIS-capable deps + the ASP build + the test tarball can exhaust the
    # runner disk, so reclaim that space up front.
    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        docker-images: true
        large-packages: false
        swap-storage: false
      continue-on-error: true
    - name: Disk after cleanup
      run: df -h
    # No caching of dependencies. See build_test_linux_arm.sh for how to fetch
    # an offline conda-pack tarball with dependencies (BinaryBuilder release
    # asp_deps_linux_arm_v1), and save_linux_arm_deps.sh for how to update it.
    - name: build_test
      # Build and test ASP on Linux aarch64 (NOT build_test.sh, which is Mac-only)
      run: ./.github/workflows/build_test_linux_arm.sh
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
         # This must be in sync with BinaryBuilder/auto_build
         name: StereoPipeline-Artifact-build_test_linux_arm
         path: ~/work/StereoPipeline/packages
         retention-days: 2
      continue-on-error: true
